{% extends "base.html" %}
{% load i18n static %}

{% block content %}

<form action="" method="post">
    {% csrf_token %}
    <div class="form-error">{{ form.non_field_errors }}</div>
    {% for f in form %}
    <p><label class="form-label" for="{{f.id_for_label}}">{{ f.label }}</label>{{ f }}</p>
    <div class="form-error"><h2>{{ f.errors }}</h2></div>
    {% endfor %}
    {% if validlink %}
    <p><button type="submit">Изменить пароль</button></p>
    {% else %}
    <a href="{% url 'home' %}" class="a-as-button">На главную</a>
    {% endif %}
</form>

{% endblock %}
