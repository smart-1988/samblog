{% extends 'base.html' %}

{% block content %}
<form action="" method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {% if user.photo %}
    <img class="profile-photo" src="{{ user.photo.url }}">
    {% else %}
    <img class="profile-photo" src="{{ default_image }}">
    {% endif %}
    <div class="form-error">{{ form.non_field_errors }}</div>
    {% for f in form %}
    <p><label class="form-label" for="{{f.id_for_label}}">{{ f.label }}</label>{{ f }}</p>
    <div class="form-error"><h2>{{ f.errors }}</h2></div>
    {% endfor %}
    <p><button type="submit" style="submit">Сохранить</button></p>
</form>

{% if not perms.users.social_auth %}
<a href="{% url 'users:change_password' %}" class="a-as-button">Изменить пароль</a>
{% endif %}

{% endblock %}
