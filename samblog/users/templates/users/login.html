{% extends 'base.html' %}

{% block content %}
 <p><a href="{% url 'social:begin' 'github' %}"><img src="/media/social-auth/github.png" style="width: 50px; height: auto;"></a></p>
<br>
<form action="" method="post">
    {% csrf_token %}
    <div class="form-error">{{ form.non_field_errors }}</div>
    {% for f in form %}
    <p><label class="form-label" for="{{f.id_for_label}}">{{ f.label }}</label>{{ f }}</p>
    <div class="form-error"><h2>{{ f.errors }}</h2></div>
    {% endfor %}
    <p><button type="submit">Войти</button></p>
    <br>
    <p><a href="{% url 'users:password_reset' %}" id="forget-a">Забыли пароль?</a></p>


</form>
{% endblock %}
